apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: java-frontend-vs
  namespace: polyglot-app
spec:
  hosts:
  - "*"
  gateways:
  - polyglot-gateway
  http:
  - route:
    - destination:
        host: java-frontend
        subset: v1
      weight: 80
    - destination:
        host: java-frontend
        subset: v2
      weight: 20
